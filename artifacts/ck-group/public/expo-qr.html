<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CK Group - Scan to open</title>
<style>
  body { margin:0; background:#080e1f; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; font-family:system-ui,sans-serif; color:#fff; padding:20px; box-sizing:border-box; }
  h2 { color:#3b9af5; margin:0 0 12px; font-size:18px; text-align:center; }
  img { border:4px solid #3b9af5; border-radius:12px; background:#fff; padding:8px; }
  .url { margin-top:14px; background:#1b2a3f; border:1px solid #3b9af5; border-radius:8px; padding:10px 14px; font-size:11px; word-break:break-all; color:#a0c4f8; text-align:center; max-width:360px; }
  .step { margin-top:10px; font-size:13px; color:#94a3b8; text-align:center; max-width:360px; }
</style>
</head>
<body>
  <h2>📱 Phone ke camera se QR scan karein</h2>
  <img id="qr" width="320" height="320" alt="App QR Code"/>
  <div class="url" id="url"></div>
  <div class="step">QR scan karte hi app aapke phone ke browser mein khul jayega — koi extra app install karne ki zaroorat nahi.</div>
  <script>
    var appUrl = window.location.origin + "/";
    document.getElementById("qr").src =
      "https://api.qrserver.com/v1/create-qr-code/?size=320x320&margin=16&data=" + encodeURIComponent(appUrl);
    document.getElementById("url").textContent = appUrl;
  </script>
</body>
</html>
